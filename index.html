<style>

  :root {
    /* light = base (manual light, or system light) */

    --fg: #2A2620;
    --fg-2: #4A4438;
    --fg-3: #7A7363;
    --accent: #8A6F3F;
    --accent-fill: #8A6F3F;
    --on-accent: #FFFFFF;
    --rule-strong: #C9BFA3;
    --rule: #DCD2BA;
    --rule-soft: #EDE6D5;
    --bar: rgba(244, 239, 228, 0.86);
    --radius: 0;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);

    --font-display: "Cormorant Garamond", "LXGW WenKai TC", Georgia, serif;
    --font-body: "Manrope", "LXGW WenKai TC", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;

  /* dark = system default (unless user forced light) */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #000000; --fg: #ECE6D5; --fg-2: #D6CFBB; --fg-3: #A89F88;
      --accent: #AA9068; --accent-fill: #AA9068; --on-accent: #000000;
      --rule-strong: #5C4E35; --rule: #2A2419; --rule-soft: #1C180F;
      --bar: rgba(0, 0, 0, 0.86);

  /* dark = manually chosen */
  :root[data-theme="dark"] {
    --bg: #000000; --fg: #ECE6D5; --fg-2: #D6CFBB; --fg-3: #A89F88;
    --accent: #AA9068; --accent-fill: #AA9068; --on-accent: #000000;
    --rule-strong: #5C4E35; --rule: #2A2419; --rule-soft: #1C180F;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    transition: background 0.25s var(--ease), color 0.25s var(--ease);
    font-family: var(--font-body);
    font-size: 17px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* R-29 · orphan/widow control */
    text-wrap: pretty;
    orphans: 3;
    widows: 3;
  }
  ::selection { background: var(--accent-fill); color: var(--on-accent); }

  /* CJK locales lean on LXGW WenKai TC for body too */

  html[lang="zh-Hant"] body,

  .wrap { max-width: 940px; margin: 0 auto; padding: 0 clamp(1.3rem, 5vw, 2.6rem); }

  a { color: var(--accent); text-underline-offset: 3px; }
  a:hover { color: var(--fg); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ---------- top bar · language toggle ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--bar);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: 940px; margin: 0 auto;
    padding: 0.8rem clamp(1.3rem, 5vw, 2.6rem);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    flex-wrap: wrap;

  .topbar-label {
    font-family: var(--font-mono);
    font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-3);
  }

  /* toggle — ported 1:1 from atelier base.css */
  .toggle { display: flex; gap: 6px; }
  .toggle button {
    font-family: "IBM Plex Mono", monospace;
    font-size: 15px; letter-spacing: 0.03em;
    min-height: 44px; padding: 0 16px;
    border: 1px solid var(--rule-strong);
    background: transparent; color: var(--fg-2);
    cursor: pointer;
    border-radius: 0;
    transition: all 0.16s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toggle button:hover { border-color: var(--accent); color: var(--fg); }
  .toggle button[aria-pressed="true"] {
    background: var(--accent-fill); color: var(--on-accent); border-color: var(--accent-fill);

  .topbar-right { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
  .theme-btn {
    font-family: "IBM Plex Mono", monospace; font-size: 14px; letter-spacing: 0.03em;
    min-height: 44px; padding: 0 12px;
    border: 1px solid var(--rule-strong); background: transparent; color: var(--fg-2);
    cursor: pointer; border-radius: 0;
    transition: all 0.16s var(--ease);
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--fg); }

  .hero { padding: clamp(3.6rem, 9vw, 6.4rem) 0 clamp(2.4rem, 5vw, 3.6rem); }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.4rem;
  }
  .hero-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(2.9rem, 8vw, 5.2rem);
    line-height: 1.04;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-wrap: balance;
    max-width: 18ch;
  }
  .hero-title em { font-style: italic; color: var(--accent); font-weight: inherit; }
  .hero-sub {
    display: block;
    font-family: var(--font-mono);
    font-size: clamp(0.95rem, 1.8vw, 1.1rem);
    letter-spacing: 0.08em;
    color: var(--fg-3);
    margin-top: 1.1rem;
    font-weight: 400;
  }
  .hero-lead {
    margin-top: 1.9rem;
    font-size: clamp(1.15rem, 2.3vw, 1.4rem);
    line-height: 1.6;
    color: var(--fg-2);
    max-width: 56ch;
  }
  .hero-actions {
    margin-top: 2.4rem;
    display: flex; gap: 0.9rem; flex-wrap: wrap;
  }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--font-body); font-weight: 600;
    font-size: 16px; letter-spacing: 0.01em;
    min-height: 48px; padding: 0 24px;
    border: 1px solid var(--fg); background: transparent; color: var(--fg);
    cursor: pointer; border-radius: var(--radius);
    text-decoration: none;
    transition: all 0.16s var(--ease);
  }
  .btn:hover { background: var(--fg); color: var(--bg); }
  .btn--filled { background: var(--accent-fill); color: var(--on-accent); border-color: var(--accent-fill); }
  .btn--filled:hover { background: transparent; color: var(--fg); border-color: var(--fg); }

  /* ---------- section scaffold ---------- */
  .section { padding: clamp(2.8rem, 6vw, 4.4rem) 0; border-top: 1px solid var(--rule); }
  .section-head { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .section-no {
    font-family: var(--font-mono);
    font-size: 14px; letter-spacing: 0.1em; color: var(--accent);
  }
  .section-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(1.7rem, 4vw, 2.5rem);
    line-height: 1.15;
    letter-spacing: -0.005em;
    color: var(--fg);
    text-wrap: balance;
  }
  .section-lead {
    font-size: clamp(1.08rem, 2vw, 1.25rem);
    line-height: 1.62; color: var(--fg-2); max-width: 60ch;
    margin-bottom: 2.2rem;
  }
  .section-lead strong { color: var(--fg); font-weight: 600; }
  .forwho-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.6rem 2.6rem; margin-top: 2rem; }
  @media (max-width: 720px) { .forwho-cols { grid-template-columns: 1fr; } }
  .forwho-col { border-top: 1px solid var(--rule); padding-top: 1.2rem; }
  .forwho-col-title { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .forwho-col--no .forwho-col-title { color: var(--fg-3); }
  .forwho-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .forwho-col li { font-size: 1.06rem; line-height: 1.5; color: var(--fg-2); padding-left: 1.6rem; position: relative; }
  .forwho-col--yes li::before { content: "\2713"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .forwho-col--no li::before { content: "\2014"; position: absolute; left: 0; color: var(--fg-3); }

  /* ---------- feature list ---------- */
  .features { list-style: none; }
  .features li {
    display: grid; grid-template-columns: auto 1fr; gap: 1.1rem;
    padding: 1.25rem 0; border-top: 1px solid var(--rule);
    align-items: baseline;
  }
  .features li:last-child { border-bottom: 1px solid var(--rule); }
  .features .f-mark {
    font-family: var(--font-mono); font-size: 15px;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .features .f-text { font-size: 1.08rem; line-height: 1.55; color: var(--fg-2); }
  .features .f-text strong { color: var(--fg); font-weight: 600; }

  /* ---------- screenshots ---------- */
  .shots {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem;
  }
  @media (max-width: 720px) { .shots { grid-template-columns: 1fr; } }
  .shot { display: flex; flex-direction: column; gap: 0.7rem; }
  .shot img {
    width: 100%; height: auto; display: block;
    border: 1px solid var(--rule-strong);
    border-radius: var(--radius);
    background: var(--rule-soft);
  }
  .shot-cap {
    font-family: var(--font-mono); font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);
  }

  /* ---------- usage cards ---------- */
  .usage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
  @media (max-width: 720px) { .usage { grid-template-columns: 1fr; } }
  .usage-card {
    border: 1px solid var(--rule-strong);
    padding: 1.6rem 1.5rem;
    display: flex; flex-direction: column; gap: 0.8rem;
    background: var(--rule-soft);
  }
  .usage-no {
    font-family: var(--font-mono); font-size: 14px;
    letter-spacing: 0.1em; color: var(--accent);
  }
  .usage-title {
    font-family: var(--font-display); font-weight: 500;
    font-size: 1.5rem; line-height: 1.2; color: var(--fg);
  }
  .usage-body { font-size: 1.02rem; line-height: 1.55; color: var(--fg-2); }
  .usage-body code {
    font-family: var(--font-mono); font-size: 0.88em;
    color: var(--accent); background: rgba(170, 144, 104, 0.1);
    padding: 0.1em 0.35em;
  }

  /* ---------- example callout ---------- */
  .example {
    border: 1px solid var(--accent);
    padding: clamp(1.8rem, 4vw, 2.6rem);
    display: flex; flex-direction: column; gap: 1.2rem;
    align-items: flex-start;
  }
  .example-quote {
    font-family: var(--font-display); font-style: italic;
    font-size: clamp(1.3rem, 2.8vw, 1.7rem); line-height: 1.4;
    color: var(--fg); max-width: 58ch;
  }
  .example-note { font-size: 1.05rem; line-height: 1.55; color: var(--fg-2); max-width: 60ch; }

  /* ---------- footer ---------- */
  .footer {
    border-top: 1px solid var(--rule); margin-top: 1rem;
    padding: 2.2rem 0 3rem;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    font-family: var(--font-mono); font-size: 14px;
    letter-spacing: 0.04em; color: var(--fg-3);
  }
  .footer a { color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.06em; }
  .footer a:hover { color: var(--accent); }
  .footer-links { display: flex; gap: 1.4rem; flex-wrap: wrap; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }
</style>
</head>

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function applyLang(lang) {
    if (!content[lang]) lang = "en";
    var c = content[lang];
    document.documentElement.lang = lang;

    // plain text nodes
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var key = el.getAttribute("data-i18n");
      if (c[key] != null) el.textContent = c[key];
    });

    // nodes that intentionally carry inline markup (e.g. <code>, <em>)
    document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
      var key = el.getAttribute("data-i18n-html");
      if (c[key] != null) el.innerHTML = c[key];
    });

    // feature list
    document.querySelectorAll("[data-i18n-list]").forEach(function (el) {
      var key = el.getAttribute("data-i18n-list");
      var items = c[key];
      if (!Array.isArray(items)) return;
      el.innerHTML = items.map(function (txt) {
        return '<li><span class="f-mark" aria-hidden="true">+</span>' +
               '<span class="f-text">' + txt + "</span></li>";
      }).join("");
    });

    // image alt text
    document.querySelectorAll("[data-alt]").forEach(function (el) {
      var key = el.getAttribute("data-alt");
      if (c[key] != null) el.setAttribute("alt", c[key]);
    });

    // toggle pressed state
    document.querySelectorAll(".toggle button").forEach(function (btn) {
      btn.setAttribute("aria-pressed", btn.getAttribute("data-lang") === lang ? "true" : "false");
    });
  }

  // wire up the toggle
  document.querySelectorAll(".toggle button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      applyLang(btn.getAttribute("data-lang"));
    });
  });

  // default en; optionally detect from navigator.language
  function detectLang() {
    var nav = (navigator.language || "en").toLowerCase();
    if (nav.indexOf("zh") === 0) {
      return (nav.indexOf("hant") > -1 || nav.indexOf("tw") > -1 ||
              nav.indexOf("hk") > -1 || nav.indexOf("mo") > -1) ? "zh-Hant" : "zh-Hans";
    }
    if (nav.indexOf("ja") === 0) return "ja";
    if (nav.indexOf("fr") === 0) return "fr";
    return "en";
  }

  // ---- theme: auto (follow system) / light / dark ----
  (function () {
    var KEY = "lc-landing-theme", root = document.documentElement;
    var btn = document.getElementById("themeBtn");
    var modes = ["auto", "light", "dark"];
    var label = { auto: "◐ Auto", light: "☀ Light", dark: "🌙 Dark" };
    function apply(m) {
      if (modes.indexOf(m) < 0) m = "auto";
      if (m === "auto") root.removeAttribute("data-theme");
      else root.setAttribute("data-theme", m);
      if (btn) { btn.textContent = label[m]; btn.setAttribute("data-mode", m); }
      try { localStorage.setItem(KEY, m); } catch (e) {}
    }
    var cur = "auto";
    try { cur = localStorage.getItem(KEY) || "auto"; } catch (e) {}
    apply(cur);
    if (btn) btn.addEventListener("click", function () {
      var m = btn.getAttribute("data-mode") || "auto";
      apply(modes[(modes.indexOf(m) + 1) % modes.length]);
    });
  })();

  applyLang(detectLang());
</script>
</body>
</html>
